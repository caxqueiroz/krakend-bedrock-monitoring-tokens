version: "3"

vars:
  PLUGIN_NAME: bedrock-usage.so
  BUILD_DIR: ./bin
  KRAKEND_VERSION: "2.13.4"
  KRAKEND_EE_VERSION: "2.13.2"
  KRAKEND_EE_BUILDER_VARIANT: "-linux-generic"
  KRAKEND_CONFIG: ./examples/krakend.json
  KRAKEND_PORT: "8080"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --listwhat
    silent: true

  build:
    desc: Build the KrakenD plugin (.so)
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -buildmode=plugin -o {{.BUILD_DIR}}/{{.PLUGIN_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.PLUGIN_NAME}}"

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:race:
    desc: Run all tests with the race detector
    cmds:
      - go test -race ./...

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  fmt:
    desc: Format Go sources
    cmds:
      - gofmt -w .

  fmt:check:
    desc: Verify Go sources are gofmt-clean
    cmds:
      - test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  verify:
    desc: Run fmt check, vet, tests, and plugin build
    cmds:
      - task: fmt:check
      - task: vet
      - task: test
      - task: build

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} coverage.out

  docker:build:
    desc: Build the plugin inside the krakend-builder image (CE-compatible .so)
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - >
        docker run --rm --platform=linux/amd64
        -v "$PWD:/src"
        -w /src
        -e CGO_ENABLED=1
        krakend/builder:{{.KRAKEND_VERSION}}
        go build -buildmode=plugin -o {{.BUILD_DIR}}/{{.PLUGIN_NAME}} .

  docker:build:ee:
    desc: Build the plugin inside the krakend-builder-ee image (EE-compatible .so; defaults to glibc/-linux-generic; requires EE license / authenticated pull)
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - >
        docker run --rm --platform=linux/amd64
        -v "$PWD:/src"
        -w /src
        -e CGO_ENABLED=1
        krakend/builder-ee:{{.KRAKEND_EE_VERSION}}{{.KRAKEND_EE_BUILDER_VARIANT}}
        go build -buildmode=plugin -o {{.BUILD_DIR}}/{{.PLUGIN_NAME}} .

  docker:run:
    desc: Run KrakenD CE with the plugin and example config mounted
    deps: [docker:build]
    cmds:
      - >
        docker run --rm --platform=linux/amd64
        -p {{.KRAKEND_PORT}}:8080
        -v "$PWD/{{.BUILD_DIR}}:/opt/krakend/plugins"
        -v "$PWD/{{.KRAKEND_CONFIG}}:/etc/krakend/krakend.json:ro"
        krakend:{{.KRAKEND_VERSION}}
        run -c /etc/krakend/krakend.json

  docker:check:
    desc: Validate the KrakenD config inside the CE image
    cmds:
      - >
        docker run --rm --platform=linux/amd64
        -v "$PWD/{{.KRAKEND_CONFIG}}:/etc/krakend/krakend.json:ro"
        krakend:{{.KRAKEND_VERSION}}
        check -c /etc/krakend/krakend.json -d

  docker:watch:
    desc: Run KrakenD CE in watch mode (auto-reloads krakend.json on change)
    deps: [docker:build]
    cmds:
      - >
        docker run --rm --platform=linux/amd64
        -p {{.KRAKEND_PORT}}:8080
        -v "$PWD/{{.BUILD_DIR}}:/opt/krakend/plugins"
        -v "$PWD/examples:/etc/krakend"
        krakend:{{.KRAKEND_VERSION}}-watch
        run -c /etc/krakend/krakend.json

  docker:image:fedora-ee:
    desc: Build a Fedora image bundling Go 1.25.9 and KrakenD EE 2.13.2 (glibc dev environment)
    cmds:
      - >
        docker build --platform=linux/amd64
        -f docker/fedora-ee.Dockerfile
        -t krakend-bedrock-dev:fedora-ee
        .

  docker:fedora-ee:build:
    desc: Build the plugin inside the Fedora image (matches RHEL/glibc target)
    deps: [docker:image:fedora-ee]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - >
        docker run --rm --platform=linux/amd64
        -v "$PWD:/src"
        -w /src
        krakend-bedrock-dev:fedora-ee
        go build -buildmode=plugin -o {{.BUILD_DIR}}/{{.PLUGIN_NAME}} .

  docker:fedora-ee:shell:
    desc: Drop into a shell inside the Fedora dev image with the repo mounted
    deps: [docker:image:fedora-ee]
    cmds:
      - >
        docker run --rm -it --platform=linux/amd64
        -v "$PWD:/src"
        -w /src
        krakend-bedrock-dev:fedora-ee
        bash

  docker:fedora-ee:run:
    desc: Run KrakenD EE inside the Fedora image with the plugin, example config, and .local/LICENSE mounted
    deps: [docker:fedora-ee:build]
    preconditions:
      - sh: test -s .local/LICENSE
        msg: "Missing .local/LICENSE — place a valid KrakenD EE license at .local/LICENSE before running this task."
    cmds:
      - >
        docker run --rm --platform=linux/amd64
        -p {{.KRAKEND_PORT}}:8080
        -v "$PWD/.local:/work"
        -v "$PWD/{{.BUILD_DIR}}:/opt/krakend/plugins:ro"
        -v "$PWD/{{.KRAKEND_CONFIG}}:/etc/krakend/krakend.json:ro"
        -w /work
        krakend-bedrock-dev:fedora-ee
        krakend run -d -c /etc/krakend/krakend.json

  fake:run:
    desc: Run the fake Bedrock backend on :9000 (serves canned responses with non-zero usage)
    cmds:
      - go run ./examples/fake-bedrock

  docker:fedora-ee:run:fake:
    desc: Run KrakenD EE in Fedora container pointing at the local fake-bedrock backend
    deps: [docker:fedora-ee:build]
    preconditions:
      - sh: test -s .local/LICENSE
        msg: "Missing .local/LICENSE — place a valid KrakenD EE license at .local/LICENSE before running this task."
      - sh: 'curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/ 2>/dev/null | grep -qE "^(2|4|5)"'
        msg: "fake-bedrock not reachable on :9000 — run `task fake:run` in another terminal first."
    cmds:
      - >
        docker run --rm --platform=linux/amd64
        --add-host=host.docker.internal:host-gateway
        -p {{.KRAKEND_PORT}}:8080
        -v "$PWD/.local:/work"
        -v "$PWD/{{.BUILD_DIR}}:/opt/krakend/plugins:ro"
        -v "$PWD/examples/krakend-fake.json:/etc/krakend/krakend.json:ro"
        -w /work
        krakend-bedrock-dev:fedora-ee
        krakend run -d -c /etc/krakend/krakend.json
