version: "3"

vars:
  PLUGIN_NAME: bedrock-usage.so
  BUILD_DIR: ./bin

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the KrakenD plugin (.so)
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -buildmode=plugin -o {{.BUILD_DIR}}/{{.PLUGIN_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.PLUGIN_NAME}}"

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:race:
    desc: Run all tests with the race detector
    cmds:
      - go test -race ./...

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  fmt:
    desc: Format Go sources
    cmds:
      - gofmt -w .

  fmt:check:
    desc: Verify Go sources are gofmt-clean
    cmds:
      - test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  verify:
    desc: Run fmt check, vet, tests, and plugin build
    cmds:
      - task: fmt:check
      - task: vet
      - task: test
      - task: build

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} coverage.out
